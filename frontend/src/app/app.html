<h1>Task Tracker</h1>

<p>Total Tasks: {{ tasks.length }}</p>

<div *ngFor="let task of tasks">
  <h3>{{ task.title }}</h3>
  <p>{{ task.description }}</p>

  <p>Due Date: {{ task.due_date | date:'mediumDate' }}</p>
  <p>Priority: {{ task.priority }}</p>
  <p>Status: {{ task.is_done ? 'Done' : 'Pending' }}</p>

  <hr>
</div>
